<body>
    <script>
        //   Using a loop, count how many even numbers exist between 1 and a user given number and display the count.
   let num = parseInt(prompt("Enter a number:"));

   let count = 0;

   for (let i = 1; i <= num; i++) {
    if (i % 2 === 0) {
        count++;
    }
    }



console.log("Total even numbers between 1 and " + num + " is: " + count);






    </script>
</body>
</html>
