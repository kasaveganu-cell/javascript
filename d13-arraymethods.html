<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    
// 1. Find the sum of all elements of the array
let arr = [10,20,30,40];

let sum = arr.reduce((a,b)=> a+b);

console.log(sum);



// 2. Find the largest number from the array

let arr = [10,50,30,80,20];

let largest = arr.sort((a,b)=> b-a)[0];

console.log(largest);

// 3. Reverse the array without using reverse method.


let reversed = [];

for (let i = arr.length - 1; i >= 0; i--) {
    reversed.push(arr[i]);
}

console.log("Original Array:", arr);
console.log("Reversed Array:", reversed);

    </script>
</body>
</html>
